<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ปฏิทินเวร ศปป.๔ กอ.รมน. — กรกฎาคม ๒๕๖๙</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', 'TH Sarabun New', sans-serif; background: #F5F4F0; color: #1a1a1a; padding: 1.5rem; }
  header { margin-bottom: 1.25rem; }
  header h1 { font-size: 26px; font-weight: 800; color: #1a1a1a; }
  header p { font-size: 16px; font-weight: 700; color: #555; margin-top: 4px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .leg { display: flex; align-items: center; gap: 7px; font-size: 15px; font-weight: 700; color: #333; background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 5px 12px; }
  .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  .cal-view { display: block; }
  .list-view { display: none; }
  .calendar { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 5px; }
  .dow { text-align: center; font-size: 16px; font-weight: 800; color: #888; padding: 6px 0; }
  .dow.sun { color: #B91C1C; } .dow.sat { color: #1D4ED8; }
  .cell { background: #fff; border: 1px solid #E0DED8; border-radius: 10px; padding: 10px 8px 8px; min-height: 160px; }
  .cell.empty { background: #EEECE8; border-color: transparent; }
  .cell.holiday { background: #FFF7ED; border-color: #FED7AA; }
  .cell.sun .daynum { color: #B91C1C; } .cell.sat .daynum { color: #1D4ED8; }
  .cell.holiday .daynum { color: #C2410C; }
  .daynum { font-size: 18px; font-weight: 800; color: #222; margin-bottom: 6px; }
  .holiday-label { font-size: 11px; font-weight: 700; color: #C2410C; margin-bottom: 4px; }
  .entry { font-size: 13px; font-weight: 700; padding: 4px 7px; border-radius: 6px; margin-bottom: 4px; line-height: 1.5; }

  .list-item { background: #fff; border: 1px solid #E0DED8; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start; }
  .list-item.holiday { background: #FFF7ED; border-color: #FED7AA; }
  .list-date { min-width: 52px; text-align: center; }
  .list-daynum { font-size: 28px; font-weight: 800; color: #222; line-height: 1; }
  .list-dayname { font-size: 13px; font-weight: 700; color: #888; margin-top: 2px; }
  .list-item.sun .list-daynum, .list-item.sun .list-dayname { color: #B91C1C; }
  .list-item.sat .list-daynum, .list-item.sat .list-dayname { color: #1D4ED8; }
  .list-item.holiday .list-daynum, .list-item.holiday .list-dayname { color: #C2410C; }
  .list-entries { flex: 1; display: flex; flex-direction: column; gap: 5px; }

  /* สี แต่ละประเภท */
  .entry.e1 { background: #1e3a8a; color: #DBEAFE; }                          /* น.ควบคุม */
  .entry.e2 { background: #065F46; color: #D1FAE5; }                          /* ผช.น.ควบคุม */
  .entry.e4 { background: #EDE9FE; color: #3B0764; border: 1px solid #C4B5FD; } /* น.ทหารปฏิบัติการ */
  .entry.e5 { background: #E8E4DC; color: #2C2820; border: 1px solid #C8C2B8; } /* เสมียน */
  .entry.e6 { background: #FEF3C7; color: #78350F; border: 1px solid #FCD34D; } /* พลขับ */
  .entry.e7 { background: #DC2626; color: #FEE2E2; }                          /* War Room */

  @media (max-width: 700px) {
    body { padding: 1rem; }
    header h1 { font-size: 22px; }
    header p { font-size: 15px; }
    .cal-view { display: none; }
    .list-view { display: block; }
    .entry { font-size: 15px; padding: 6px 10px; }
  }
  @media print {
    body { padding: 0.5rem; background: #fff; }
    .list-view { display: none !important; }
    .cal-view { display: block !important; }
  }
</style>
</head>
<body>
<header>
  <h1>ปฏิทินเวร ศปป.๔ กอ.รมน.</h1>
  <p>กรกฎาคม ๒๕๖๙ — รายชื่อผู้ปฏิบัติหน้าที่</p>
</header>
<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#1e3a8a"></div>น.ควบคุมและรายงาน</div>
  <div class="leg"><div class="leg-dot" style="background:#065F46"></div>ผช.น.ควบคุม/น.เวรผู้ใหญ่</div>
  <div class="leg"><div class="leg-dot" style="background:#7C3AED"></div>น.ทหารประจำส่วนปฏิบัติการ</div>
  <div class="leg"><div class="leg-dot" style="background:#888"></div>เจ้าหน้าที่เสมียน</div>
  <div class="leg"><div class="leg-dot" style="background:#F59E0B"></div>พลขับ</div>
  <div class="leg"><div class="leg-dot" style="background:#DC2626"></div>War Room</div>
</div>
<div class="cal-view"><div class="calendar" id="cal"></div></div>
<div class="list-view" id="list"></div>

<script>
const HOLIDAYS = {
  28: "วันเฉลิมพระชนมพรรษาฯ",
  29: "วันอาสาฬหบูชา",
  30: "วันเข้าพรรษา",
};

const DATA = {
  1:  [{r:"e4",n:"พ.ท. ธนารักษ์ นามบัณฑิต"},{r:"e7",n:"พ.อ. ยศสหวรรษ โสตถิเสวีณ์"}],
  2:  [{r:"e4",n:"พ.ท. ศราวุธ สัตตบุศย์"},{r:"e7",n:"ผอ.ศปป.4 ฯ / รอง ผอ.ศปป.4 ฯ"}],
  3:  [{r:"e4",n:"พ.ท. นพพร โภคสุวรรณ"},{r:"e7",n:"น.อ.หญิง ศศิธร ลุมพิกานนท์ ร.น."}],
  4:  [{r:"e4",n:"พ.ท. สมบัติ ดวงผาสุข"}],
  5:  [{r:"e1",n:"พ.อ.หญิง บุษบา โพอุทัย"},{r:"e4",n:"ร.อ. ธนกร เชื้อเมืองพาน"}],
  6:  [{r:"e4",n:"ร.อ. เกรียงไกร เอี่ยมพินิจ"},{r:"e7",n:"พ.อ.หญิง ณัชชา เที่ยงามจรัส"}],
  7:  [{r:"e4",n:"ร.ท. ไพรัช มนตรี"},{r:"e7",n:"พ.อ.หญิง วิลาสินี ชาญใบพัด"}],
  8:  [{r:"e4",n:"ร.อ. นรภัทร คงคารัตน์"},{r:"e7",n:"พ.อ. ชาญณรงค์ สมัครการ"}],
  9:  [{r:"e4",n:"ร.ต. วิชัย จันทรังสรรค์"},{r:"e7",n:"ผอ.ศปป.4 ฯ / รอง ผอ.ศปป.4 ฯ"}],
  10: [{r:"e4",n:"พ.ท. ธนารักษ์ นามบัณฑิต"},{r:"e7",n:"พ.อ. กิตติภพ ศรีเมือง"}],
  11: [{r:"e4",n:"พ.ท. ศราวุธ สัตตบุศย์"},{r:"e6",n:"ส.อ. ณัฐพล บุตรพรหม"}],
  12: [{r:"e4",n:"พ.ท. นพพร โภคสุวรรณ"}],
  13: [{r:"e4",n:"พ.ท. สมบัติ ดวงผาสุข"},{r:"e7",n:"พ.อ. สุรเชษฐ์ ทองขาว"}],
  14: [{r:"e4",n:"ร.อ. ธนกร เชื้อเมืองพาน"},{r:"e7",n:"พ.อ.หญิง อุมาพร ทับทิมรณยุทธ"}],
  15: [{r:"e4",n:"ร.อ. เกรียงไกร เอี่ยมพินิจ"},{r:"e7",n:"พ.อ.หญิง อุษณีย์ อรรคบุตร"}],
  16: [{r:"e4",n:"ร.ท. ไพรัช มนตรี"},{r:"e5",n:"จ.ส.อ. ณรงค์เดช บุญโกศล"},{r:"e7",n:"ผอ.ศปป.4 ฯ / รอง ผอ.ศปป.4 ฯ"}],
  17: [{r:"e4",n:"ร.อ. นรภัทร คงคารัตน์"},{r:"e5",n:"จ.ส.อ. พูนศักดิ์ พยับตรี"},{r:"e7",n:"น.อ.หญิง ญาธิดา พรหมมานอก"}],
  18: [{r:"e4",n:"ร.ต. วิชัย จันทรังสรรค์"},{r:"e5",n:"จ.ส.อ. ณรงค์ จันทร์อี๋"}],
  19: [{r:"e4",n:"พ.ท. ธนารักษ์ นามบัณฑิต"},{r:"e5",n:"จ.ส.อ. ภิรายุ มีแก้วน้อย"}],
  20: [{r:"e2",n:"พ.อ.หญิง อุษณีย์ อรรคบุตร"},{r:"e4",n:"พ.ท. ศราวุธ สัตตบุศย์"},{r:"e5",n:"จ.ส.อ. รณกฤต พิทักษ์คงคา"},{r:"e7",n:"พ.ท. นพพร โภคสุวรรณ"}],
  21: [{r:"e4",n:"พ.ท. นพพร โภคสุวรรณ"},{r:"e7",n:"พ.ท. ศราวุธ สัตตบุศย์"}],
  22: [{r:"e4",n:"พ.ท. สมบัติ ดวงผาสุข"},{r:"e6",n:"ส.อ. ณัฐพล บุตรพรหม"},{r:"e7",n:"พ.ท.หญิง พรณอร ปริปุรณะ"}],
  23: [{r:"e4",n:"ร.อ. ธนกร เชื้อเมืองพาน"},{r:"e5",n:"จ.ส.อ. สัมพันธ์ พุทธรักษา"},{r:"e7",n:"ผอ.ศปป.4 ฯ / รอง ผอ.ศปป.4 ฯ"}],
  24: [{r:"e4",n:"ร.อ. เกรียงไกร เอี่ยมพินิจ"},{r:"e7",n:"พ.ท. สมบัติ ดวงผาสุข"}],
  25: [{r:"e4",n:"ร.ท. ไพรัช มนตรี"},{r:"e5",n:"จ.ส.อ. ก้องเกียรติ อึงนันทศิริกุล"}],
  26: [{r:"e4",n:"ร.อ. นรภัทร คงคารัตน์"},{r:"e5",n:"จ.ส.อ. กรกช บุญเสริมส่ง"}],
  27: [{r:"e4",n:"ร.ต. วิชัย จันทรังสรรค์"},{r:"e5",n:"จ.ส.อ. สีบสาย สายทรัพย์สิน"},{r:"e7",n:"พ.ท. ธนารักษ์ นามบัณฑิต"}],
  28: [{r:"e4",n:"พ.ท. ศราวุธ สัตตบุศย์"}],
  29: [{r:"e4",n:"พ.ท. นพพร โภคสุวรรณ"},{r:"e5",n:"จ.ส.อ. วัชรพงษ์ อู๋สูงเนิน"}],
  30: [{r:"e4",n:"พ.ท. สมบัติ ดวงผาสุข"}],
  31: [{r:"e4",n:"ร.อ. ธนกร เชื้อเมืองพาน"},{r:"e5",n:"ส.อ. สาธิต อยู่ถาวร"},{r:"e7",n:"พ.ท.หญิง ปุณญภา เลิศไตรกุล"}],
};

const DOW_LABELS = ["อา.","จ.","อ.","พ.","พฤ.","ศ.","ส."];
const DOW_FULL   = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];
const DOW_CLS    = ["sun","","","","","","sat"];
const startDay   = 2;

// CALENDAR
const cal = document.getElementById('cal');
DOW_LABELS.forEach((d,i)=>{
  const el=document.createElement('div');
  el.className='dow '+DOW_CLS[i];
  el.textContent=d;
  cal.appendChild(el);
});
for(let i=0;i<startDay;i++){
  const el=document.createElement('div');
  el.className='cell empty';
  cal.appendChild(el);
}
for(let d=1;d<=31;d++){
  const dow=(startDay+d-1)%7;
  const isHol=HOLIDAYS[d];
  const el=document.createElement('div');
  el.className='cell '+DOW_CLS[dow]+(isHol?' holiday':'');
  let html=`<div class="daynum">${d}</div>`;
  if(isHol) html+=`<div class="holiday-label">${HOLIDAYS[d]}</div>`;
  if(DATA[d]) DATA[d].forEach(e=>{html+=`<div class="entry ${e.r}">${e.n}</div>`;});
  el.innerHTML=html;
  cal.appendChild(el);
}

// LIST
const list=document.getElementById('list');
for(let d=1;d<=31;d++){
  if(!DATA[d]) continue;
  const dow=(startDay+d-1)%7;
  const isHol=HOLIDAYS[d];
  const item=document.createElement('div');
  item.className='list-item '+DOW_CLS[dow]+(isHol?' holiday':'');
  let entries=DATA[d].map(e=>`<div class="entry ${e.r}">${e.n}</div>`).join('');
  let holHtml=isHol?`<div class="entry" style="background:#FED7AA;color:#7C2D12;border:1px solid #FB923C;">${HOLIDAYS[d]}</div>`:'';
  item.innerHTML=`
    <div class="list-date">
      <div class="list-daynum">${d}</div>
      <div class="list-dayname">${DOW_FULL[dow]}</div>
    </div>
    <div class="list-entries">${holHtml}${entries}</div>`;
  list.appendChild(item);
}
</script>
</body>
</html>
